name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: NPM Install
        run: npm install
     
      - name: Debug secrets
        run: |
          if [-z "${{ secrets.Dockerhub_username }}" ]; then echo "USERNAME IS EMPTY";else echo "username OK";fi
          if [ -z "${{ secrets.Dockerhub_token }}" ]; then echo "TOKEN IS EMPTY";
          else echo "token OK";fi


      - name: Docker build and push
        run: |
          # Run commands to build and push Docker images
          docker build -t swiggy-clone .
          docker tag swiggy-clone shyamsunder07/swiggy-clone:latest
          echo "${{ secrets.Dockerhub_token }}" | docker login docker.io -u "${{ secrets.Dockerhub_username }}" --password-stdin
          docker push shyamsunder07/swiggy-clone:latest
        
  deploy:
   needs: build
   runs-on: [self-hosted]
   steps:
      - name: docker pull image
        run: docker pull shyamsunder07/swiggy-clone:latest
      - name: Image scan
        run: trivy image shyamsunder07/swiggy-clone:latest > trivyimagedeploy.txt
      - name: Deploy to container
        run: docker run -d --name swiggy-clone1 -p 3000:3000 shyamsunder07/swiggy-clone:latest
      - name: Update kubeconfig
        run: aws eks --region ap-south-1 update-kubeconfig --name EKS_CLOUD
      - name: Deploy to kubernetes
        run: kubectl apply -f deployment-service.yml
